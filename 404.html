<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - School Optional</title>
    <link rel="canonical" href="https://schooloptional.com/404">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.unmin.css">
    <style>
        .error-page {
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; text-align: center; padding: 24px;
        }
        .error-code {
            font-size: 6rem; font-weight: 800; color: var(--accent);
            line-height: 1; margin-bottom: 12px;
        }
        .error-page h1 {
            font-size: 1.5rem; font-weight: 700; margin-bottom: 10px;
        }
        .error-page p {
            font-size: 1rem; color: var(--text-secondary); margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div>
            <div class="error-code">404</div>
            <h1>This page doesn't exist.</h1>
            <p>But your options do. Let's get you back on track.</p>
            <a href="/" class="btn btn-primary">Back to Home</a>
        </div>
    </div>
</body>
</html>
