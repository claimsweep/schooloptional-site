<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Admin - School Optional</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding: 2rem; }
        .admin-wrap { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .sub { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }

        .login-form { margin-top: 4rem; text-align: center; }
        .login-form input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 0.75rem 1rem; border-radius: 8px; font-size: 1rem; width: 100%; max-width: 300px; margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto; }
        .login-form input:focus { outline: none; border-color: #E86F6F; }
        .login-form button { background: #E86F6F; color: #fff; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .login-form button:hover { background: #d55a5a; }
        .login-error { color: #E86F6F; font-size: 0.85rem; margin-top: 0.5rem; }

        .badge { display: inline-block; background: #E86F6F; color: #fff; font-size: 0.8rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 10px; margin-left: 0.5rem; }
        .empty { color: #666; text-align: center; padding: 3rem; font-size: 0.95rem; }

        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
        .card-role { display: inline-block; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #E86F6F; background: rgba(232,111,111,0.1); padding: 0.2rem 0.5rem; border-radius: 4px; margin-bottom: 0.5rem; }
        .card-text { font-size: 0.9rem; line-height: 1.6; color: #ccc; margin-bottom: 0.75rem; }
        .card-time { font-size: 0.7rem; color: #666; margin-bottom: 0.75rem; }
        .card-actions { display: flex; gap: 0.75rem; }
        .btn-approve { background: #2d8a4e; color: #fff; border: none; padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .btn-approve:hover { background: #3aa05e; }
        .btn-reject { background: transparent; color: #888; border: 1px solid #444; padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .btn-reject:hover { background: #2a1a1a; color: #E86F6F; border-color: #E86F6F; }
        .btn-approve:disabled, .btn-reject:disabled { opacity: 0.5; cursor: default; }

        .refresh-btn { background: transparent; color: #888; border: 1px solid #333; padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; float: right; }
        .refresh-btn:hover { color: #fff; border-color: #666; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-wrap">
        <div class="login-form" id="login-section">
            <h1>Wall Admin</h1>
            <p class="sub">Review and approve wall submissions</p>
            <input type="password" id="admin-password" placeholder="Password" autocomplete="off">
            <button onclick="doLogin()">Log In</button>
            <div class="login-error" id="login-error"></div>
        </div>

        <div id="admin-section" style="display: none;">
            <h1>Pending Submissions <span class="badge" id="pending-count">0</span></h1>
            <button class="refresh-btn" onclick="loadSubmissions()">Refresh</button>
            <p class="sub">Approve or reject anonymous stories for The Wall</p>
            <div id="submissions-list"></div>
        </div>
    </div>

    <script>
    let adminPassword = '';

    function doLogin() {
        const pw = document.getElementById('admin-password').value;
        if (!pw) return;

        fetch('/api/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'login', password: pw })
        })
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                adminPassword = pw;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-section').style.display = 'block';
                loadSubmissions();
            } else {
                document.getElementById('login-error').textContent = 'Wrong password.';
            }
        })
        .catch(() => {
            document.getElementById('login-error').textContent = 'Connection error.';
        });
    }

    document.getElementById('admin-password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doLogin();
    });

    function loadSubmissions() {
        fetch('/api/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'list', password: adminPassword })
        })
        .then(r => r.json())
        .then(data => {
            if (!data.ok) return;
            const list = document.getElementById('submissions-list');
            const count = document.getElementById('pending-count');
            count.textContent = data.submissions.length;

            if (data.submissions.length === 0) {
                list.innerHTML = '<div class="empty">No pending submissions. Check back later.</div>';
                return;
            }

            list.innerHTML = data.submissions.map(function(s) {
                const roleMap = { parent: 'Parent', student: 'Former Student', teacher: 'Teacher' };
                const roleHtml = s.role && roleMap[s.role] ? '<div class="card-role">' + roleMap[s.role] + '</div>' : '';
                const time = new Date(s.created_at + 'Z').toLocaleString();
                return '<div class="card" id="card-' + s.id + '">' +
                    roleHtml +
                    '<div class="card-text">' + s.content.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
                    '<div class="card-time">' + time + '</div>' +
                    '<div class="card-actions">' +
                    '<button class="btn-approve" onclick="handleAction(\'approve\',' + s.id + ',this)">Approve</button>' +
                    '<button class="btn-reject" onclick="handleAction(\'reject\',' + s.id + ',this)">Reject</button>' +
                    '</div></div>';
            }).join('');
        });
    }

    function handleAction(action, id, btn) {
        const card = document.getElementById('card-' + id);
        const buttons = card.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);

        fetch('/api/admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: action, password: adminPassword, id: id })
        })
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                card.style.opacity = '0.3';
                card.style.transition = 'opacity 0.3s';
                setTimeout(function() {
                    card.remove();
                    const remaining = document.querySelectorAll('.card').length;
                    document.getElementById('pending-count').textContent = remaining;
                    if (remaining === 0) {
                        document.getElementById('submissions-list').innerHTML = '<div class="empty">No pending submissions. Check back later.</div>';
                    }
                }, 300);
            }
        });
    }
    </script>
</body>
</html>
